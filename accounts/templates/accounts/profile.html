{% extends 'landing/base.html' %}

{% block content %}
<style>
  .profile-card {
    max-width: 660px;
    margin: 0 auto;
    padding: 2rem;
    border-radius: 1.25rem;
    background: #ffffff;
    box-shadow: 0 18px 50px rgba(44, 20, 110, 0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .profile-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 22px 60px rgba(44, 20, 110, 0.12);
  }

  .profile-card h4 {
    font-size: 1.85rem;
    margin-bottom: 0.75rem;
    color: #3a0769;
  }

  .profile-card p {
    font-size: 1rem;
    line-height: 1.7;
    color: #39314d;
  }

  .profile-card p strong {
    color: #241242;
  }

  .profile-actions {
    margin-top: 1.6rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  @media (max-width: 768px) {
    .profile-card {
      padding: 1.6rem;
    }

    .profile-actions {
      flex-direction: column;
      align-items: stretch;
    }
  }
</style>

<div class="container mt-5">
    <div class="profile-card">
        <h2 class="mb-3">My Profile</h2>
        <h4>Welcome, {{ request.user.username }} 👋</h4>
        <hr>
        <p><strong>Username:</strong> {{ request.user.username }}</p>
        <p><strong>Email:</strong> {{ request.user.email }}</p>

        <div class="profile-actions">
          <a href="{% url 'accounts:logout' %}" class="btn btn-danger btn-lg w-auto">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
