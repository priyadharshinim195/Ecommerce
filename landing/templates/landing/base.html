{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MyShop{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'landing/style.css' %}" />

    <style>
      /* ===== BODY ===== */
      body {
        font-family: "Poppins", sans-serif;
        background: #f5f3ff;
        color: #2c005f;
        margin: 0;
        padding: 0;
      }

      a {
        text-decoration: none;
      }

      /* ===== NAVBAR ===== */
      .main-nav {
        background: white;
        padding: 12px 5%;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .brand-name {
        font-size: 1.8rem;
        font-weight: 800;
        color: #6a00ff;
      }

      .search-group {
        width: 45%;
        display: flex;
        background: #f2eaff;
        padding: 6px 12px;
        border-radius: 10px;
      }

      .search-group input {
        border: none;
        background: none;
        width: 100%;
        outline: none;
        font-size: 1rem;
      }

      .search-group button {
        background: none;
        border: none;
        font-size: 1.2rem;
        color: #6a00ff;
        cursor: pointer;
      }

      .right-links a {
        margin-left: 20px;
        font-weight: 600;
        color: #4b008e;
        transition: color 0.3s;
      }

      .right-links a:hover {
        color: #6a00ff;
      }

      .navbar-toggler {
        border: none;
      }

      .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(106,0,255, 0.8)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }

      /* ===== CATEGORY ICON MENU ===== */
      .category-row {
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        justify-content: center;
        padding: 25px 0;
      }

      .cat-box {
        text-align: center;
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s;
        flex: 0 1 120px;
      }

      .cat-box img {
        width: 80px;
        height: 80px;
        border-radius: 12px;
        background: white;
        padding: 12px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        transition: transform 0.3s;
      }

      .cat-box:hover img {
        transform: scale(1.1);
      }

      .cat-box p {
        margin-top: 8px;
        font-weight: 500;
        color: #4b008e;
      }

      /* ===== MAIN CONTENT ===== */
      main.container {
        padding: 40px 15px;
      }

      /* ===== FOOTER ===== */
      footer {
        background: #1a0034;
        color: #d3b7ff;
        text-align: center;
        padding: 20px;
        margin-top: 60px;
      }

      /* ===== BUTTONS ===== */
      .btn-primary {
        background-color: #6a00ff;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        transition: background 0.3s;
      }

      .btn-primary:hover {
        background-color: #4b008e;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 992px) {
        .search-group {
          width: 100%;
          max-width: 100%;
          padding: 10px 0;
        }

        .search-group input {
          min-width: 0;
        }

        .right-links {
          width: 100%;
          justify-content: center;
        }

        .right-links a {
          margin-left: 0;
          font-size: 0.95rem;
          width: 100%;
          text-align: center;
        }
      }

      @media (max-width: 768px) {
        .search-group {
          flex-wrap: wrap;
          justify-content: space-between;
        }

        .cat-box {
          flex: 0 1 120px;
        }

        .cat-box img {
          width: 60px;
          height: 60px;
        }

        main.container {
          padding: 20px 12px;
        }
      }
    </style>
  </head>

  <body>
    <!-- ⭐ NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top main-nav">
      <div class="container">
        <a class="navbar-brand brand-name mb-0" href="{% url 'home' %}">MyShop</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <form action="/search/" method="GET" class="search-group mx-auto mx-lg-3 my-2 my-lg-0">
            <input type="text" name="q" placeholder="Search products..." />
            <button>🔍</button>
          </form>

          <div class="right-links ms-auto d-flex flex-column flex-lg-row align-items-center gap-2 gap-lg-3">
            {% if request.user.is_authenticated %}
              
              <a href="/wishlist/">Wishlist ❤️</a>
              <a href="/cart/">Cart 🛒</a>
              <a href="/orders/my-orders/">My Orders 📦</a>
              <a href="/accounts/profile/">Profile 👤</a>
              <a href="/accounts/logout/">Logout</a>
            {% else %}
              <a href="/accounts/register/">Register</a>
              <a href="/accounts/login/">Login</a>
              <a href="/cart/">Cart 🛒</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <!-- ⭐ CATEGORY ICONS -->
    

    <!-- ⭐ PAGE CONTENT -->
    <main class="container">{% block content %} {% endblock %}</main>

    <footer>© 2025 MyShop. Shopping Made Smarter.</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
